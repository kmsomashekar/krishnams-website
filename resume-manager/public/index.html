<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Manager</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div id="app-container">
        <!-- Sidebar Navigation Shell -->
        <nav id="sidebar-nav">
            <div class="nav-brand">Resume Manager</div>
            <ul class="nav-links">
                <li><a href="#dashboard" class="nav-item active" data-view="dashboard">Dashboard</a></li>
                <li><a href="#resumes" class="nav-item" data-view="resumes">Resume Library</a></li>
                <li><a href="#opportunities" class="nav-item" data-view="opportunities">Opportunities</a></li>
                <li><a href="#contacts" class="nav-item" data-view="contacts">Contacts & Recruiters</a></li>
            </ul>
            <div class="nav-footer">
                <span class="env-badge">Dev Mode</span>
            </div>
        </nav>

        <!-- Main Content Core -->
        <main id="main-content">
            <header id="top-bar">
                <h1 id="view-title">Dashboard</h1>
                <div id="user-status">Active Session</div>
            </header>
            
            <!-- Dynamic Injection Target View Component -->
            <section id="view-viewport">
                <!-- Content rendered via JavaScript -->
            </section>
        </main>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
