name = "resume-manager-dev"
main = "src/index.js"
compatibility_date = "2026-07-18"

# Development explicit environment profiles block
[env.dev]
vars = { ENVIRONMENT = "development" }

# Database binding placeholder for Cloudflare D1
[[env.dev.d1_databases]]
binding = "DB"
database_name = "resume-manager-dev"
database_id = "5562c841-e7d3-4246-a3c5-93c878c7f500"

# Object Storage binding placeholder for private Cloudflare R2
[[env.dev.r2_buckets]]
binding = "BUCKET"
bucket_name = "resume-manager-dev"